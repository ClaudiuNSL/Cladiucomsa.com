<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero · WebGL ca personaj central</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #060606;
    --fg: #f4f1ea;
    --muted: #8a8680;
    --line: rgba(244, 241, 234, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Instrument Serif", Georgia, serif;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Canvas WebGL — fluid central, domină viewport-ul */
  #fluid {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Vignette ca să țină focusul în centru */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 0%,
      transparent 40%,
      rgba(6, 6, 6, 0.6) 75%,
      rgba(6, 6, 6, 0.95) 100%);
  }

  /* ─── Navbar */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: clamp(20px, 3vw, 32px) clamp(24px, 4vw, 56px);
  }
  .logo {
    font-style: italic;
    font-size: 28px;
    letter-spacing: -0.02em;
  }
  .menu-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--fg);
    display: grid;
    place-items: center;
    cursor: pointer;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    transition: border-color 0.2s ease;
  }
  .menu-btn:hover { border-color: rgba(244, 241, 234, 0.4); }

  /* ─── Hero conținut — mai mic, sub WebGL */
  main {
    position: relative;
    z-index: 5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 clamp(24px, 5vw, 80px) clamp(80px, 10vw, 140px);
  }
  .hero {
    text-align: center;
  }
  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1.1s 1.4s ease forwards;
  }
  h1 {
    font-size: clamp(40px, 7vw, 96px);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 1.2s 1.6s ease forwards;
  }
  h1 em {
    color: var(--muted);
    font-style: italic;
  }
  .tagline {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: clamp(16px, 1.5vw, 20px);
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.4;
    opacity: 0;
    animation: fadeUp 1.2s 1.8s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Marker preview-only */
  .marker {
    position: fixed;
    top: clamp(20px, 3vw, 32px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    background: rgba(6, 6, 6, 0.7);
    padding: 6px 12px;
    border: 1px solid var(--line);
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
  <div class="marker">MOCKUP 02 · WEBGL CENTRAL</div>

  <canvas id="fluid"></canvas>
  <div class="vignette"></div>

  <nav>
    <div class="logo"><em>Cc</em></div>
    <button class="menu-btn" aria-label="meniu">☰</button>
  </nav>

  <main>
    <div class="hero">
      <div class="eyebrow">Portofoliu · București</div>
      <h1>Claudiu Comșa · <em>developer &amp; designer</em></h1>
      <p class="tagline">
        Produse digitale cu atenție la detaliu și performanță.
      </p>
    </div>
  </main>

<script>
  /* ────────────────────────────────────────────
     WebGL fluid pseudo-Navier-Stokes
     Domain warping pentru efect "cerneală în apă"
     Răspunde la mouse cu o forță locală.
     ──────────────────────────────────────────── */
  const canvas = document.getElementById('fluid');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

  if (!gl) {
    canvas.style.background = '#060606';
  } else {
    const vert = `
      attribute vec2 a_pos;
      void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
    `;
    const frag = `
      precision highp float;
      uniform vec2 u_res;
      uniform float u_time;
      uniform vec2 u_mouse;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      float noise(vec2 p) {
        vec2 i = floor(p), f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
                   mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
      }
      float fbm(vec2 p) {
        float s = 0.0, a = 0.5;
        for (int i = 0; i < 6; i++) {
          s += a * noise(p);
          p *= 2.0;
          a *= 0.5;
        }
        return s;
      }
      void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.y;
        float t = u_time * 0.08;

        // domain warping în două straturi — efect ink-in-water
        vec2 q = vec2(
          fbm(uv + vec2(t, t * 0.7)),
          fbm(uv + vec2(5.2 + t, 1.3 - t * 0.5))
        );
        vec2 r = vec2(
          fbm(uv + q * 2.6 + vec2(1.7 + t * 0.4, 9.2)),
          fbm(uv + q * 2.6 + vec2(8.3, 2.8 - t * 0.3))
        );
        float v = fbm(uv + r * 1.8);

        // forță locală la mouse
        vec2 m = (u_mouse - 0.5) * vec2(u_res.x / u_res.y, 1.0) * 2.0;
        float md = length(uv - m);
        v += smoothstep(0.45, 0.0, md) * 0.35;

        // contrast + curbă pentru "depth"
        v = pow(v, 1.5);
        v = smoothstep(0.0, 0.85, v);

        // monochrome cu un tint cald foarte subtil
        vec3 col = vec3(v) * vec3(1.0, 0.985, 0.94);

        gl_FragColor = vec4(col * 0.78, 1.0);
      }
    `;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const uRes = gl.getUniformLocation(prog, 'u_res');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uMouse = gl.getUniformLocation(prog, 'u_mouse');

    let mouse = [0.5, 0.5];
    let targetMouse = [0.5, 0.5];
    window.addEventListener('pointermove', (e) => {
      targetMouse[0] = e.clientX / window.innerWidth;
      targetMouse[1] = 1.0 - e.clientY / window.innerHeight;
    });

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const t0 = performance.now();
    function frame() {
      const t = (performance.now() - t0) / 1000;
      // ease mouse pentru fluiditate
      mouse[0] += (targetMouse[0] - mouse[0]) * 0.05;
      mouse[1] += (targetMouse[1] - mouse[1]) * 0.05;
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.uniform1f(uTime, t);
      gl.uniform2f(uMouse, mouse[0], mouse[1]);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    frame();
  }
</script>
</body>
</html>
